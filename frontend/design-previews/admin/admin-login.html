<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HaorBoat Admin — sign in (design preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#1a73e8; --blue-600:#1560d6; --blue-700:#0f56be;
    --ink:#111725; --body:#4b5568; --muted:#8b93a3; --hair:#e7e9ee;
    --bg:#f5f6f8; --raise-1:#ffffff; --field:#f3f5f8;
    --danger:#d64242;
    --e2:0 2px 4px rgba(17,23,37,.05), 0 8px 20px -8px rgba(17,23,37,.14);
    --e3:0 20px 50px -14px rgba(17,23,37,.26), 0 6px 16px rgba(17,23,37,.08);
    --top-hi:inset 0 1px 0 rgba(255,255,255,.7);
    --ring:0 0 0 3px rgba(26,115,232,.16);
    --r-2xl:16px; --r:10px; --dur:.22s; --ease:cubic-bezier(.2,.7,.3,1);
    --display:'Space Grotesk','Inter',system-ui,sans-serif;
    --font:'Inter',system-ui,-apple-system,'Segoe UI','Hind Siliguri',sans-serif;
  }
  :root[data-theme="dark"]{
    --blue:#5aa0ff; --blue-600:#74b0ff; --blue-700:#4a86e6;
    --ink:#eef1f6; --body:#a7b0c0; --muted:#6f7788; --hair:#242834;
    --bg:#0c0e13; --raise-1:#161922; --field:#12151d;
    --danger:#f0736f;
    --e2:0 2px 6px rgba(0,0,0,.5), 0 10px 26px -10px rgba(0,0,0,.7);
    --e3:0 24px 60px -16px rgba(0,0,0,.78), 0 6px 16px rgba(0,0,0,.5);
    --top-hi:inset 0 1px 0 rgba(255,255,255,.05);
    --ring:0 0 0 3px rgba(90,160,255,.24);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--body);-webkit-font-smoothing:antialiased;
    min-height:100vh;display:grid;place-items:center;padding:24px;position:relative;overflow:hidden;
    background:var(--bg)}
  /* ambient brand aura — the one signature flourish */
  body::before,body::after{content:"";position:fixed;border-radius:50%;filter:blur(90px);z-index:0;pointer-events:none}
  body::before{width:520px;height:520px;top:-160px;left:-120px;background:color-mix(in srgb,var(--blue) 22%,transparent)}
  body::after{width:460px;height:460px;bottom:-180px;right:-120px;background:color-mix(in srgb,var(--blue) 14%,transparent)}
  h1{margin:0;color:var(--ink);font-family:var(--display);letter-spacing:-.03em;font-weight:600}
  button{font-family:inherit;cursor:pointer}
  :focus-visible{outline:none;box-shadow:var(--ring);border-radius:10px}
  .theme-btn{position:fixed;top:20px;right:20px;border:1px solid var(--hair);background:var(--raise-1);width:42px;height:42px;
    border-radius:12px;font-size:17px;color:var(--ink);display:grid;place-items:center;z-index:2;box-shadow:var(--e2)}
  .theme-btn .sun{display:none} :root[data-theme="dark"] .theme-btn .moon{display:none} :root[data-theme="dark"] .theme-btn .sun{display:block}
  .card{position:relative;z-index:1;width:100%;max-width:412px;background:var(--raise-1);border:1px solid var(--hair);
    border-radius:var(--r-2xl);box-shadow:var(--e3),var(--top-hi);padding:36px 32px}
  .logo{display:flex;gap:11px;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:23px;color:var(--ink);letter-spacing:-.03em}
  .logo .mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(145deg,var(--blue),var(--blue-700));color:#fff;
    display:grid;place-items:center;font-size:18px;box-shadow:0 8px 18px -6px var(--blue),var(--top-hi)}
  .logo .b{color:var(--blue)}
  .badge{display:block;text-align:center;margin:16px auto 0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;
    color:var(--blue);background:color-mix(in srgb,var(--blue) 11%,transparent);padding:6px 0;border-radius:999px;width:186px}
  .lead{text-align:center;margin:24px 0 24px}
  .lead h1{font-size:23px} .lead p{margin:8px 0 0;font-size:13.5px;color:var(--muted);line-height:1.55}
  .field{border:1px solid var(--hair);border-radius:var(--r);padding:9px 14px;background:var(--field);margin-bottom:14px;transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease)}
  .field:focus-within{border-color:var(--blue);box-shadow:var(--ring)}
  .field label{display:block;font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
  .field input{width:100%;border:none;background:none;font-family:inherit;font-size:15.5px;font-weight:600;color:var(--ink)}
  .field input:focus{outline:none}
  .field .row{display:flex;align-items:center;gap:10px}
  .field .pre{font-family:var(--display);font-weight:600;color:var(--muted);font-size:15px}
  .show{border:none;background:none;color:var(--blue);font-size:12px;font-weight:700}
  .btn{width:100%;justify-content:center;border-radius:var(--r);padding:13px;font-weight:600;font-size:15px;border:none;
    background:var(--blue);color:#fff;display:inline-flex;align-items:center;gap:8px;
    box-shadow:0 8px 18px -8px var(--blue),inset 0 1px 0 rgba(255,255,255,.18);transition:background var(--dur) var(--ease)}
  .btn:hover{background:var(--blue-600)}
  .rowb{display:flex;align-items:center;justify-content:space-between;margin:2px 0 18px;font-size:13px}
  .chk{display:flex;gap:8px;align-items:center;font-weight:500;color:var(--body)}
  .chk input{accent-color:var(--blue)}
  .link{color:var(--blue);font-weight:600}
  .foot{text-align:center;margin-top:20px;font-size:11.5px;color:var(--muted);line-height:1.5}
  .err{display:flex;gap:8px;align-items:center;background:color-mix(in srgb,var(--danger) 10%,transparent);color:var(--danger);
    font-size:12.5px;font-weight:500;padding:10px 13px;border-radius:var(--r);margin-bottom:16px;border:1px solid color-mix(in srgb,var(--danger) 20%,transparent)}
</style>
</head>
<body>
<button class="theme-btn" id="themeToggle" aria-label="Toggle theme"><span class="moon">🌙</span><span class="sun">☀️</span></button>
<form class="card" onsubmit="return false">
  <div class="logo"><span class="mark">⚓</span> Haor<span class="b">Boat</span></div>
  <span class="badge">Platform console</span>
  <div class="lead">
    <h1>Sign in</h1>
    <p>Staff access only. Owners &amp; crew sign in from the boat dashboard.</p>
  </div>

  <div class="err">⚠ Wrong phone or password. 2 attempts left before a 10-minute lock.</div>

  <div class="field">
    <label>Phone</label>
    <div class="row"><span class="pre">+880</span><input type="tel" value="1700000000" autocomplete="username"></div>
  </div>
  <div class="field">
    <label>Password</label>
    <div class="row"><input type="password" value="platform-secret" autocomplete="current-password"><button type="button" class="show" id="showPw">Show</button></div>
  </div>

  <div class="rowb">
    <label class="chk"><input type="checkbox" checked> Keep me signed in</label>
    <a class="link" href="#">Forgot password?</a>
  </div>

  <button class="btn" type="submit">Sign in →</button>
  <div class="foot">Sessions expire after 15 min idle · refreshed for 30 days · CSRF-protected</div>
</form>
<script>
  var root=document.documentElement,stored=null;
  try{stored=localStorage.getItem('hb-theme');}catch(e){}
  root.setAttribute('data-theme',stored||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));
  document.getElementById('themeToggle').addEventListener('click',function(){
    var n=root.getAttribute('data-theme')==='dark'?'light':'dark';
    root.setAttribute('data-theme',n);try{localStorage.setItem('hb-theme',n);}catch(e){}
  });
  document.getElementById('showPw').addEventListener('click',function(){
    var i=this.previousElementSibling;var s=i.type==='password';i.type=s?'text':'password';this.textContent=s?'Hide':'Show';
  });
</script>
</body>
</html>
