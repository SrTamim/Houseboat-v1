<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HaorBoat Admin — sign in (design preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#1a73e8; --blue-600:#1560d6; --blue-700:#0f56be; --blue-050:#e9f1fe;
    --ink:#0f2440; --body:#4a5568; --muted:#8a93a3; --line:#e6eaf0;
    --bg:#ffffff; --bg-2:#eef2f7; --surface:#ffffff;
    --danger:#d64545; --danger-050:#fdecec;
    --shadow-lg:0 24px 60px rgba(15,36,64,.22);
    --r:.6rem; --r-lg:1rem;
    --font:'Inter',system-ui,-apple-system,'Segoe UI','Hind Siliguri',sans-serif;
    --mono:'Inter',ui-monospace,monospace;
  }
  :root[data-theme="dark"]{
    --blue:#4f97ff; --blue-600:#63a4ff; --blue-700:#3d7fe0; --blue-050:#17233a;
    --ink:#eef3fb; --body:#aab6c9; --muted:#7a879c; --line:#243247;
    --bg:#0b1220; --bg-2:#0e1728; --surface:#131d30;
    --danger:#f0736f; --danger-050:#2c1717;
    --shadow-lg:0 24px 60px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--body);letter-spacing:-.01em;-webkit-font-smoothing:antialiased;
    min-height:100vh;display:grid;place-items:center;padding:24px;
    background:radial-gradient(120% 90% at 50% -10%,var(--blue-050),var(--bg-2) 60%)}
  h1,h2,h3{margin:0;color:var(--ink);letter-spacing:-.02em}
  button{font-family:inherit;cursor:pointer}
  :focus-visible{outline:2.5px solid var(--blue);outline-offset:2px;border-radius:8px}
  .theme-btn{position:fixed;top:20px;right:20px;border:1px solid var(--line);background:var(--surface);width:42px;height:42px;border-radius:11px;font-size:17px;color:var(--ink);display:grid;place-items:center}
  .theme-btn .sun{display:none} :root[data-theme="dark"] .theme-btn .moon{display:none} :root[data-theme="dark"] .theme-btn .sun{display:block}
  .card{width:100%;max-width:410px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);padding:34px 30px}
  .logo{display:flex;gap:10px;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:var(--ink);letter-spacing:-.03em}
  .logo .mark{width:36px;height:36px;border-radius:50%;background:linear-gradient(150deg,var(--blue),var(--blue-700));color:#fff;display:grid;place-items:center;font-size:17px}
  .logo .b{color:var(--blue);font-style:italic}
  .badge{display:block;text-align:center;margin:14px auto 0;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);background:var(--blue-050);padding:6px 0;border-radius:999px;width:180px}
  .lead{text-align:center;margin:22px 0 24px}
  .lead h1{font-size:22px} .lead p{margin:7px 0 0;font-size:13.5px;color:var(--muted)}
  .field{border:1px solid var(--line);border-radius:var(--r);padding:10px 14px;background:var(--bg-2);margin-bottom:14px;transition:border-color .14s,box-shadow .14s}
  .field:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-050)}
  .field label{display:block;font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
  .field input{width:100%;border:none;background:none;font-family:inherit;font-size:15.5px;font-weight:600;color:var(--ink)}
  .field input:focus{outline:none}
  .field .row{display:flex;align-items:center;gap:10px}
  .field .pre{font-family:var(--mono);font-weight:800;color:var(--muted);font-size:15px}
  .show{border:none;background:none;color:var(--blue);font-size:12px;font-weight:700}
  .btn{width:100%;justify-content:center;border-radius:999px;padding:13px;font-weight:700;font-size:15px;border:none;background:var(--blue);color:#fff;display:inline-flex;align-items:center;gap:8px;box-shadow:0 6px 16px -6px var(--blue);transition:background .14s}
  .btn:hover{background:var(--blue-600)}
  .rowb{display:flex;align-items:center;justify-content:space-between;margin:2px 0 18px;font-size:13px}
  .chk{display:flex;gap:8px;align-items:center;font-weight:600;color:var(--body)}
  .chk input{accent-color:var(--blue)}
  .link{color:var(--blue);font-weight:700}
  .foot{text-align:center;margin-top:20px;font-size:12px;color:var(--muted)}
  .err{display:flex;gap:8px;align-items:center;background:var(--danger-050);color:var(--danger);font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:var(--r);margin-bottom:16px}
</style>
</head>
<body>
<button class="theme-btn" id="themeToggle" aria-label="Toggle theme"><span class="moon">🌙</span><span class="sun">☀️</span></button>
<form class="card" onsubmit="return false">
  <div class="logo"><span class="mark">⚓</span> Haor<span class="b">Boat</span></div>
  <span class="badge">Platform console</span>
  <div class="lead">
    <h1>Sign in</h1>
    <p>Staff access only. Owner &amp; crew sign in from the boat dashboard.</p>
  </div>

  <div class="err">⚠ Wrong phone or password. 2 attempts left before a 10-minute lock.</div>

  <div class="field">
    <label>Phone</label>
    <div class="row"><span class="pre">+880</span><input type="tel" value="1700000000" autocomplete="username"></div>
  </div>
  <div class="field">
    <label>Password</label>
    <div class="row"><input type="password" value="platform-secret" autocomplete="current-password"><button type="button" class="show" id="showPw">Show</button></div>
  </div>

  <div class="rowb">
    <label class="chk"><input type="checkbox" checked> Keep me signed in</label>
    <a class="link" href="#">Forgot password?</a>
  </div>

  <button class="btn" type="submit">Sign in →</button>
  <div class="foot">Sessions expire after 15 min idle · refreshed for 30 days · CSRF-protected</div>
</form>
<script>
  var root=document.documentElement,stored=null;
  try{stored=localStorage.getItem('hb-theme');}catch(e){}
  root.setAttribute('data-theme',stored||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));
  document.getElementById('themeToggle').addEventListener('click',function(){
    var n=root.getAttribute('data-theme')==='dark'?'light':'dark';
    root.setAttribute('data-theme',n);try{localStorage.setItem('hb-theme',n);}catch(e){}
  });
  document.getElementById('showPw').addEventListener('click',function(){
    var i=this.previousElementSibling;var s=i.type==='password';i.type=s?'text':'password';this.textContent=s?'Hide':'Show';
  });
</script>
</body>
</html>
